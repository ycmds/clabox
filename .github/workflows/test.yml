name: test

on:
  pull_request:
    branches: [main]

jobs:
  test:
    # macOS runner: the functional tests exercise the real `sandbox-exec`.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test
