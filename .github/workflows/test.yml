name: test

on:
  pull_request:
    branches: [main]

jobs:
  test:
    # macOS runner: the functional tests exercise the real `sandbox-exec`.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run test
