name: release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    # macOS runner: the functional tests exercise the real `sandbox-exec`.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Sign the commit-back as the maintainer/org, NOT the default
          # semantic-release-bot <semantic-release-bot@martynus.net> (which would
          # otherwise show up in the GitHub contributors graph).
          GIT_AUTHOR_NAME: LSK.js
          GIT_AUTHOR_EMAIL: lskjsru@gmail.com
          GIT_COMMITTER_NAME: LSK.js
          GIT_COMMITTER_EMAIL: lskjsru@gmail.com
        run: npx semantic-release
