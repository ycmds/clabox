name: release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    # macOS runner: the functional tests exercise the real `sandbox-exec`.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run test
      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GIT_AUTHOR_NAME: clabox-bot
          GIT_AUTHOR_EMAIL: bot@users.noreply.github.com
          GIT_COMMITTER_NAME: clabox-bot
          GIT_COMMITTER_EMAIL: bot@users.noreply.github.com
